<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Форум — внутренний архив</title>

<style>

body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #020617);
    color:#e5e7eb;
}

.container {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:rgba(30,41,59,0.85);
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:340px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
}

h2 {
    margin-bottom:10px;
}

input {
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:none;
    outline:none;
    background:#0f172a;
    color:white;
}

button {
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

.error {
    margin-top:10px;
    color:#f87171;
    font-size:14px;
}

.small {
    font-size:12px;
    color:#64748b;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="box">

<h2>Форум — внутренний архив</h2>

<p class="small">
Введите код доступа к архивным проектным материалам
</p>

<input type="text" id="code" placeholder="код доступа">

<button onclick="check()">Войти</button>

<p class="error" id="error"></p>

<p class="small">
уровень доступа: ограниченный
</p>

</div>

</div>

<script>

function check() {
    let code = document.getElementById("code").value;

    if(code === "1347") {
        window.location.href = "https://drive.google.com/YOUR_LINK";
    } else {
        document.getElementById("error").innerText =
        "код доступа неверен";
    }
}

</script>

</body>
</html>
